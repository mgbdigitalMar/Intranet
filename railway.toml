[build]
providers = [\"php\", \"nodejs\"]

[build.php]
version = \"8.2\"

[build.nodejs]
version = \"20\"

[build.php.build-commands]
run = [\"composer install --no-dev --optimize-autoloader\", \"npm ci\", \"npm run build\", \"php artisan migrate --force\"]

[deploy]
startCommand = \"vendor/bin/heroku-php-apache2 public/\"

