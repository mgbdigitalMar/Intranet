[build]
providers = ["php", "nodejs"]

[build.php]
version = "8.2"

[build.nodejs]
version = "20"

[build.php.build-commands]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci", "npm run build"]

[deploy]
startCommand = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan event:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"

