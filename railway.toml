[build]
providers = ["php", "nodejs"]

[build.php]
version = "8.2"

[build.nodejs]
version = "20"

[build.php.build-commands]
"php artisan migrate:fresh --seed --force --env=staging"

[deploy]
startCommand = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan event:cache && php artisan serve --host=0.0.0.0 --port=$PORT"

